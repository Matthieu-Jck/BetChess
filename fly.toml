# fly.toml app configuration file generated for betchess on 2026-04-25T20:49:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'betchess'
primary_region = 'ams'

[build]

[env]
  PORT = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
