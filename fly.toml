# Replace this value if you want to run `fly deploy` locally without passing `-a`.
app = "replace-with-your-fly-app-name"
primary_region = "cdg"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
